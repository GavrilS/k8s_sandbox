apiVersion: v1
kind: Pod
metadata:
  name: red
spec:
  initContainers:
  - name: red-initcontainer
    image: busybox
    command:
    - sleep
    - "20"
  containers:
  - command:
    - sh
    - -c
    - echo The app is running! && sleep 3600
    image: busybox:1.28
    imagePullPolicy: IfNotPresent
    name: red-container
